              url: https://www.linkedin.com/in/marcos-moreno-mart%C3%ADnez/
            - icon: fab fa-github
              url: https://github.com/marcosmoreno-ai

      # About
      about:
        title: "Sobre Mí"
        content: |-
          Soy Marcos Moreno Martínez, AI Tech Lead con sede en España. Me gradué en Ingeniería Robótica por la Universidad de Alicante y desde entonces me he especializado en visión por computador, entrenamiento de modelos de deep learning y gestión de equipos de IA.

          Llevo 6 años en la misma empresa, donde he pasado de construir pipelines de datos y entrenar CNNs con TensorFlow, a liderar un equipo multidisciplinar que abarca proyectos de visión artificial, agentes de IA y RPA. Me muevo bien entre la parte técnica y la coordinación de personas, aunque lo que realmente me apasiona sigue siendo resolver problemas difíciles con modelos bien entrenados.
        skills:
          title: "Tecnologías con las que trabajo habitualmente:"

      # Experience
      experience:
        items:
          - company: "Empresa Actual"
            companyUrl: "https://example.com"
            jobs:
              - name: "AI Tech Lead"
                date: "2023 - Presente"
                info:
                  content: Liderando equipos de visión artificial, agentes y RPA
                content: |
                  Responsable de coordinar varios equipos de IA en paralelo: un equipo de Computer Vision (etiquetadores, un doctor en matemáticas y un perfil junior) y un equipo de Agentes y RPA (senior fullstack, backend, frontend y especialista en agentes).

                  - Gestión y formación de perfiles junior y senior.
                  - Coordinación con CTO y Project Manager para comunicar avances y bloqueos.
                  - Supervisión de proyectos de visión artificial en producción con más de 11 CNNs.
                  - Dirección técnica de proyectos de agentes de IA y automatización RPA.

              - name: "Computer Vision Engineer"
                date: "2021 - 2023"
                info:
                  content: Responsable del equipo de visión por computador
                content: |
                  Tras la marcha de mi compañera al doctorado, asumí la responsabilidad total del equipo de visión. Incorporé y formé a nuevos perfiles (etiquetadores y un perfil junior de IA).

                  - Formación de nuevos miembros del equipo desde cero.
                  - Gestión de dataset: etiquetado, estructuración, pipelines de preprocesado.
                  - Experimentación con distintas losses y técnicas de entrenamiento.

              - name: "Junior AI Engineer"
                date: "2019 - 2021"
                info:
                  content: Incorporación y primeros pasos en producción
                content: |
                  Me incorporé justo antes del despliegue en producción de una máquina con más de 11 CNNs. Los primeros meses estuvieron dedicados al dataset: búsqueda de herramientas, gestión de bases de datos, pipelines de preprocesado y etiquetado.

                  - Construcción y mantenimiento del dataset desde cero.
                  - Finetuning de modelos y experimentación con TensorFlow.
                  - Primeros modelos propios con autonomía a los 2 años de entrada.

      # Education
      education:
        items:
          - title: "Grado en Ingeniería Robótica"
            school:
              name: "Universidad de Alicante"
              url: "https://www.ua.es"
            date: "2015 - 2019"
            content: |-
              TFG: Desarrollo de un sistema de detección de semáforos y pasos de peatones para asistir a personas con discapacidad visual.

              - Entrenamiento de un modelo YOLO para detectar semáforos en rojo/verde y pasos de peatones.
              - Servidor Flask para servir el modelo como API.
              - App Android que recibía las predicciones e informaba al usuario mediante vibraciones.
            featuredLink:
              enable: false
              name: "Ver proyecto"
              url: "https://example.com"

      # Achievements
      achievements:
        items:
          - title: C1 de inglés
            content: Certificado de nivel C1 de inglés obtenido de forma autodidacta tras el TFG.
            image: /images/achievement.jpg
          - title: TFG — Asistente visual para ciegos
            content: Sistema de detección de semáforos con YOLO + Flask + Android para personas con discapacidad visual.
            image: /images/achievement.jpg
          - title: 6 años liderando IA en producción
            content: Desde junior construyendo datasets hasta liderar equipos multidisciplinares de visión artificial y agentes.
            image: /images/achievement.jpg

      # Projects
      projects:
        items:
          - title: Asistente Visual para Peatones Ciegos
            content: Sistema de IA para asistir a personas con discapacidad visual en cruces de peatones. Detecta semáforos en rojo/verde y pasos de peatones usando YOLO, servido con Flask y consumido por una app Android que avisa mediante vibraciones.
            image: /images/projects/profile.png
            badges:
              - "YOLO"
              - "Flask"
              - "Android"
              - "Python"
            links:
              - icon: fab fa-github
                url: https://github.com

      # Contact
      contact:
        content: ¿Tienes alguna pregunta o simplemente quieres saludar? Mi bandeja de entrada está abierta.
        btnName: Escríbeme

