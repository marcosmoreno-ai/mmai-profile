  # About
  about:
    enable: true
    title: "About Me"
    content: |-
      I'm Marcos, an AI Engineering Leader based in Spain.

      Over the last 6 years at VRAIA I've grown from building dataset pipelines to leading a Machine Learning team with 30+ deep learning models (CNNs and Vision Transformers) running in production. More recently I've taken on a supervisory role on an AI Agents and RPA project to help it ship on time.

      What I've learned is that the hardest part of AI in production isn't the models — it's the people, the communication, and the process. I've spent years at that boundary: technically solid enough to earn my team's trust, and organizationally aware enough to keep things moving when they start to break down.

      C1 English. I lead with clarity. I grow people around me.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Python"
        - "TensorFlow"
        - "PyTorch"
        - "YOLO"
        - "OpenCV"
        - "MLflow"
        - "LangChain"
        - "LangGraph"
        - "Docker"
        - "Linux"
        - "Git"
        - "uv"
        - "ruff"

  # Experience
  experience:
    enable: true
    items:
      - company: "VRAIA"
        companyUrl: "https://vraia.com/"
        jobs:
          - name: "AI Tech Lead"
            date: "2023 - Present"
            info:
              content: Leading ML, Agents and RPA teams
            content: |
              Leading two parallel AI teams: a Machine Learning team focused on Computer Vision (2 labelers, a PhD mathematician, a junior ML engineer) and an AI Agents & RPA team (senior fullstack, backend, frontend and an agent specialist) — 8 people across very different profiles and disciplines.

              - Technical oversight of multiple production computer vision systems with 30+ deep learning models (CNNs and Vision Transformers) deployed across different projects.
              - Team management and mentoring across junior and senior profiles.
              - Bridge between engineers and upper management — reporting, protecting the team, unblocking delivery.
              - Introduced tooling standards (uv, ruff, MLflow) that improved consistency and reduced friction within the ML team.
              - Resolved critical communication breakdowns between the AI and IT teams — misalignments in model deployment and dependency versioning (cuDNN, ONNX, TensorRT) that had been blocking production deployments for months.

          - name: "ML Engineer"
            date: "2021 - 2023"
            info:
              content: Full ownership of computer vision projects
            content: |
              Took full ownership of computer vision projects after the team restructured. Managed two separate workstreams — segmentation and classification networks — simultaneously.

              - Implemented MLflow for model tracking and improved pre/post-processing pipelines.
              - Owned the full ML lifecycle: training, experimentation, ONNX export and coordination with IT for TensorRT production deployment.
              - Refactored a legacy classification codebase inherited in poor condition.
              - Onboarded and mentored a new team member with no prior professional programming experience.
              - Trained non-technical labelers in dataset methodology, workflow, and basic Python and SQL — enabling them to write their own scripts and run queries autonomously.

          - name: "Junior ML Engineer"
            date: "2019 - 2021"
            info:
              content: First steps in production AI
            content: |
              Joined during a critical production deployment. Before getting repo access, proactively built Python tooling to automate repetitive labeling tasks and a prototype app to manage dataset splits — later used as the basis for a more robust internal tool.

              - Self-initiated automation tools that improved the team's labeling workflow.
              - Once given repo access, moved quickly into model fine-tuning and experimentation with TensorFlow.
              - First experience with production model deployment pipelines (.pb format, coordinating with IT integration).

  # Education
  education:
    enable: true
    index: false
    items:
      - title: "Bachelor's Degree in Robotics Engineering"
        school:
          name: "University of Alicante"
          url: "https://www.ua.es"
        date: "2015 - 2019"
        content: |-
          Final Thesis: AI-powered visual assistant for blind pedestrians at crossings.

          - Custom dataset of 1,010 labeled images (green light, red light, pedestrian crossing) captured across multiple Spanish cities, day and night.
          - Fine-tuned YOLOv3 on Darknet using an Nvidia Quadro P6000 GPU, reaching 92% recall and 75% IoU on the test set.
          - Flask server in Python to serve the model as an API.
          - Android app in Java consuming predictions and alerting the user via haptic and audio feedback.
        featuredLink:
          enable: false
          name: "View project"
          url: "https://example.com"

  # Achievements
  achievements:
    enable: true
    items:
      - title: 6 Years Growing in Production AI
        content: Junior ML Engineer to AI Tech Lead in the same company. From building dataset pipelines to leading 8 people across two parallel AI teams.
        image: /images/achievement.jpg
      - title: C1 English
        content: Reached C1 level post-graduation through self-study and formal exam preparation. Actively maintained through weekly speaking practice.
        image: /images/achievement.jpg
      - title: Deep Learning Specialization — DeepLearning.AI · Andrew Ng · 2021
        content: 5-course specialization covering CNNs, RNNs, LSTMs, Transformers, hyperparameter tuning and optimization.
        image: /images/achievement.jpg
      - title: GANs Specialization — DeepLearning.AI · 2022
        content: 3-course specialization covering GAN architecture, training strategies, image generation and image-to-image translation.
        image: /images/achievement.jpg
      - title: LangChain Essentials — LangChain Academy · 2026
        content: Official LangChain course covering core concepts and Python implementation.
        image: /images/achievement.jpg
      - title: LangGraph Essentials — LangChain Academy · 2026
        content: Official LangGraph course covering stateful agent workflows in Python.
        image: /images/achievement.jpg

  # Projects
  projects:
    enable: true
    items:
      - title: Visual Assistant for Blind Pedestrians
        content: End-to-end AI system to help visually impaired people cross pedestrian crossings safely, under any lighting condition. Built a custom dataset of 1,010 images, fine-tuned YOLOv3 reaching 92% recall and 75% IoU. Served via Flask API, consumed by an Android app with haptic and audio feedback. Validated in real-world tests with 100% accuracy.
        image: /images/projects/profile.png
        badges:
          - "YOLOv3"
          - "Flask"
          - "Android"
          - "Python"
          - "Darknet"
        links:
          - icon: fab fa-github
            url: https://github.com/marcosmoreno-ai

  # Contact
