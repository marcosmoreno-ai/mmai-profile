        content: End-to-end system using YOLO + Flask + Android to help visually impaired people navigate pedestrian crossings safely.
        image: /images/achievement.jpg
      - title: 6 Years Leading AI in Production
        content: From junior building datasets to leading multidisciplinary teams in computer vision, AI agents and RPA.
        image: /images/achievement.jpg

  # Projects
