  # About
  about:
    enable: true
    title: "About Me"
    content: |-
      I'm Marcos Moreno Martínez, an AI Tech Lead based in Spain. I hold a degree in Robotics Engineering from the University of Alicante, and I've spent the last 6 years specializing in computer vision, deep learning model training, and AI team management.

      I joined my current company right before a major production deployment of a system with over 11 CNNs. Since then, I've grown from building data pipelines and fine-tuning models with TensorFlow, to leading a multidisciplinary team covering computer vision projects, AI agents, and RPA. I'm comfortable operating at the boundary between hands-on technical work and people management — and I hold a C1 level in English.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Python"
        - "TensorFlow"
        - "YOLO"
        - "OpenCV"
        - "Computer Vision"
        - "Flask"
        - "Docker"
        - "Linux"
        - "Git"
        - "SQL"

  # Experience
  experience:
    enable: true
    items:
      - company: "Current Company"
        companyUrl: "https://example.com"
        jobs:
          - name: "AI Tech Lead"
            date: "2023 - Present"
            info:
              content: Leading computer vision, agents and RPA teams
            content: |
              Leading multiple parallel AI teams: a Computer Vision team (labelers, a PhD in mathematics and a junior AI profile) and an Agents & RPA team (senior fullstack, backend, frontend and an AI agent specialist).

              - Team management and mentoring of both junior and senior profiles.
              - Reporting to CTO and Project Manager, communicating progress and blockers.
              - Technical oversight of production computer vision systems with 11+ CNNs.
              - Technical direction of AI agent and RPA automation projects.

          - name: "Computer Vision Engineer"
            date: "2021 - 2023"
            info:
              content: Sole owner of the computer vision team
            content: |
              After my colleague left for a PhD, I took full ownership of the computer vision team. I recruited and trained new profiles from scratch.

              - Onboarding and training of new team members (labelers and junior AI).
              - Dataset management: labeling, structuring, preprocessing pipelines.
              - Experimentation with custom loss functions and training strategies.

          - name: "Junior AI Engineer"
            date: "2019 - 2021"
            info:
              content: First steps in production AI
            content: |
              Joined the company just before a major production deployment of a system with 11+ CNNs. First months were fully dedicated to the dataset: tool research, database setup, preprocessing pipelines and labeling.

              - Built and maintained the dataset infrastructure from scratch.
              - Model fine-tuning and experimentation with TensorFlow.
              - First fully autonomous models after 2 years at the company.

  # Education
  education:
    enable: true
    index: false
    items:
      - title: "Bachelor's Degree in Robotics Engineering"
        school:
          name: "University of Alicante"
          url: "https://www.ua.es"
        date: "2015 - 2019"
        content: |-
          Final Thesis: AI-powered visual assistant for blind pedestrians at crossings.

          - Trained a YOLO model to detect red/green traffic lights and pedestrian crossings.
          - Built a Flask server to serve the model as an API.
          - Developed an Android app that consumed the predictions and alerted the user via vibration patterns.
        featuredLink:
          enable: false
          name: "View project"
          url: "https://example.com"

  # Achievements
  achievements:
    enable: true
    items:
      - title: C1 English Certificate
        content: Self-taught English from scratch after graduation, reaching C1 level.
        image: /images/achievement.jpg
      - title: Final Thesis — Visual Assistant for Blind Pedestrians
        content: End-to-end system using YOLO + Flask + Android to help visually impaired people navigate pedestrian crossings safely.
        image: /images/achievement.jpg
      - title: 6 Years Leading AI in Production
        content: From junior building datasets to leading multidisciplinary teams in computer vision, AI agents and RPA.
        image: /images/achievement.jpg

  # Projects
  projects:
    enable: true
    items:
      - title: Visual Assistant for Blind Pedestrians
        content: AI system to assist visually impaired people at pedestrian crossings. Detects traffic lights and crossings using YOLO, served via Flask, consumed by an Android app that alerts users through vibration patterns.
        image: /images/projects/profile.png
        badges:
          - "YOLO"
          - "Flask"
          - "Android"
          - "Python"
        links:
