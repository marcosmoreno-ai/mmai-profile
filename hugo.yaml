          fontAwesomeIcons:
            - icon: fab fa-linkedin
              url: https://www.linkedin.com/in/marcos-moreno-mart%C3%ADnez/
            - icon: fab fa-github
              url: https://github.com/marcosmoreno-ai

      # About
      about:
        enable: true
        title: "Sobre Mí"
        content: |-
          Soy Marcos, AI Engineering Leader con sede en España.

          En los últimos 6 años en VRAIA he pasado de construir pipelines de datos a liderar un equipo de Machine Learning con más de 30 modelos de deep learning (CNNs y Vision Transformers) en producción. Más recientemente asumí la supervisión de un proyecto de AI Agents y RPA para ayudar a que saliera adelante.

          Lo que he aprendido es que lo más difícil de la IA en producción no son los modelos — son las personas, la comunicación y los procesos. Llevo años moviéndome en esa frontera: con la solidez técnica para ganarme la confianza de mi equipo, y la visión organizativa para mantener las cosas en marcha cuando empiezan a atascarse.

          C1 de inglés. Lidero con claridad. Hago crecer a las personas a mi alrededor.
        skills:
          enable: true
          title: "Tecnologías con las que trabajo:"
          items:
            - "Python"
            - "TensorFlow"
            - "PyTorch"
            - "YOLO"
            - "OpenCV"
            - "MLflow"
            - "LangChain"
            - "LangGraph"
            - "Docker"
            - "Linux"
            - "Git"
            - "uv"
            - "ruff"

      # Experience
      experience:
        enable: true
        items:
          - company: "VRAIA"
            companyUrl: "https://vraia.com/"
            jobs:
              - name: "AI Tech Lead"
                date: "2023 - Presente"
                info:
                  content: Liderando equipos de ML, Agentes y RPA
                content: |
                  Liderando dos equipos de IA en paralelo: un equipo de Machine Learning centrado en Visión Artificial (2 etiquetadores, un matemático con doctorado, un ingeniero junior de ML) y un equipo de Agentes de IA y RPA (senior fullstack, backend, frontend y un especialista en agentes) — 8 personas con perfiles y disciplinas muy distintas.

                  - Supervisión técnica de múltiples sistemas de visión artificial en producción con más de 30 modelos de deep learning (CNNs y Vision Transformers) desplegados en distintos proyectos.
                  - Gestión de equipos y mentoría de perfiles junior y senior.
                  - Puente entre ingenieros y dirección — reportes, defensa del equipo y resolución de bloqueos.
                  - Introduje estándares de herramientas (uv, ruff, MLflow) que mejoraron la consistencia y redujeron la fricción dentro del equipo de ML.
                  - Resolví bloqueos críticos de comunicación entre los equipos de IA e IT — malentendidos en la implementación de modelos y falta de alineación en versiones de dependencias clave (cuDNN, ONNX, TensorRT) que llevaban meses bloqueando los despliegues en producción.

              - name: "ML Engineer"
                date: "2021 - 2023"
                info:
                  content: Responsabilidad total de los proyectos de visión artificial
                content: |
                  Asumí la responsabilidad total de los proyectos de visión artificial tras la reestructuración del equipo. Gestioné dos líneas de trabajo separadas — redes de segmentación y clasificación — simultáneamente.

                  - Implementé MLflow para el seguimiento de modelos y mejoré los pipelines de pre/post-procesado.
                  - Responsable del ciclo completo de ML: entrenamiento, experimentación, exportación ONNX y coordinación con IT para el despliegue en producción con TensorRT.
                  - Refactoricé una base de código legacy de clasificación heredada en mal estado.
                  - Incorporé y mentoricé a un nuevo miembro del equipo sin experiencia profesional previa en programación.
                  - Formé a los etiquetadores del equipo — perfiles no técnicos — en metodología de dataset, workflow y nociones básicas de Python y SQL para que pudiesen generar scripts propios y lanzar queries, ganando autonomía en su trabajo diario.

              - name: "Junior ML Engineer"
                date: "2019 - 2021"
                info:
                  content: Primeros pasos en IA en producción
                content: |
                  Me incorporé durante un despliegue crítico en producción. Antes de tener acceso al repositorio, construí proactivamente herramientas en Python para automatizar tareas repetitivas de etiquetado y una app prototipo para gestionar divisiones del dataset — que luego sirvió de base para una herramienta interna más robusta.

                  - Herramientas de automatización por iniciativa propia que mejoraron el flujo de trabajo de etiquetado del equipo.
                  - Una vez con acceso al repositorio, avancé rápidamente hacia el fine-tuning de modelos y la experimentación con TensorFlow.
                  - Primera experiencia con pipelines de despliegue de modelos en producción (formato .pb, coordinación con el equipo de IT).

      # Education
      education:
        enable: true
        index: false
        items:
          - title: "Grado en Ingeniería Robótica"
            school:
              name: "Universidad de Alicante"
              url: "https://www.ua.es"
            date: "2015 - 2019"
            content: |-
              Trabajo Fin de Grado: Asistente visual con IA para peatones ciegos en cruces.

              - Dataset propio de 1.010 imágenes etiquetadas (semáforo verde, semáforo rojo, paso de peatones) capturadas en varias ciudades españolas, de día y de noche.
              - Entrenamiento de YOLOv3 sobre Darknet con GPU Nvidia Quadro P6000, alcanzando un 92% de recall y 75% IoU en el conjunto de test.
              - Servidor Flask en Python para servir el modelo como API.
              - App Android en Java que consumía las predicciones y alertaba al usuario mediante vibración y sonido.
            featuredLink:
              enable: false
              name: "Ver proyecto"
              url: "https://example.com"

      # Achievements
      achievements:
        enable: true
        items:
          - title: 6 Años Creciendo en IA en Producción
            content: De Junior ML Engineer a AI Tech Lead en la misma empresa. Desde construir pipelines de datos hasta liderar 8 personas en dos equipos de IA en paralelo.
            image: /images/achievement.jpg
          - title: C1 de Inglés
            content: Alcancé el nivel C1 tras la graduación mediante estudio autodidacta y preparación formal del examen. Mantenido activamente mediante práctica de conversación semanal.
            image: /images/achievement.jpg
          - title: Deep Learning Specialization — DeepLearning.AI · Andrew Ng · 2021
            content: Especialización de 5 cursos que cubre CNNs, RNNs, LSTMs, Transformers, ajuste de hiperparámetros y optimización.
            image: /images/achievement.jpg
          - title: GANs Specialization — DeepLearning.AI · 2022
            content: Especialización de 3 cursos que cubre arquitectura GAN, estrategias de entrenamiento, generación de imágenes y traducción imagen a imagen.
            image: /images/achievement.jpg
          - title: LangChain Essentials — LangChain Academy · 2026
            content: Curso oficial de LangChain que cubre conceptos clave e implementación en Python.
            image: /images/achievement.jpg
          - title: LangGraph Essentials — LangChain Academy · 2026
            content: Curso oficial de LangGraph que cubre flujos de trabajo de agentes con estado en Python.
            image: /images/achievement.jpg

      # Projects
      projects:
        enable: true
        items:
          - title: Asistente Visual para Peatones Ciegos
            content: Sistema de IA de extremo a extremo para ayudar a personas con discapacidad visual a cruzar pasos de peatones de forma segura, bajo cualquier condición de iluminación. Construí un dataset personalizado de 1.010 imágenes, fine-tuné YOLOv3 alcanzando un 92% de recall y 75% IoU. Servido mediante API Flask, consumido por una app Android con retroalimentación háptica y de audio. Validado en pruebas reales en calle con un 100% de acierto.
            image: /images/projects/profile.png
            badges:
              - "YOLOv3"
              - "Flask"
              - "Android"
              - "Python"
              - "Darknet"
            links:
              - icon: fab fa-github
                url: https://github.com/marcosmoreno-ai

      # Contact
      contact:
        enable: true
        content: Mi bandeja de entrada siempre está abierta. Ya sea que tengas una pregunta o simplemente quieras saludar, ¡haré todo lo posible por responderte!
        btnName: Escríbeme
        btnLink: mailto:marcosmoreno.of@gmail.com

