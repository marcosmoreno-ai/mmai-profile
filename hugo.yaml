    params:
      # Hero
      hero:
        enable: true
        intro: "Hola, soy"
        title: "Marcos Moreno Martínez"
        subtitle: "AI Engineering Leader"
        content: "Ingeniero de ML con 6 años de experiencia en casos reales de producción, actualmente liderando dos equipos de IA. Especializado en Computer Vision, Deep Learning y en el liderazgo y la comunicación necesarios para que los proyectos lleguen a buen puerto."
        image: /images/ai-cv-image-2.jpg
        bottomImage:
          enable: true
        button:
          enable: true
          name: "Currículum"
          url: "#"
          download: true
          newPage: false
